services:
    accounts:
        image: "ashish3913/accounts:s4"
        container_name: "accounts-ms"
        ports:
            - "8080:8080"
        deploy:
            resources:
                limits:
                    memory: 700m
        networks:
            - eazybank

    Loans:
        image: "ashish3913/loans:s4"
        container_name: "loans-ms"
        ports:
            - "8090:8090"
        deploy:
            resources:
                limits:
                    memory: 700m
        networks:
            - eazybank
    cards:
        image: "ashish3913/cards:s4"
        container_name: "cards-ms"
        ports:
            - "9090:9090"
        deploy:
            resources:
                limits:
                    memory: 700m
        networks:
            - eazybank
networks:
    eazybank:
        driver: "bridge"
